schema_version: "1.0"
pack_id: plc_start_feedback
name: "PLC 电机启动反馈测试能力包"
domain: plc_io
version: "0.1.0"
status: draft
description: >
  面向 PLC I/O 系统的电机启动反馈测试能力包。
  覆盖互锁信号检查、启动信号输出、反馈信号等待、测试环境复位。

entrypoints:
  instructions: instructions.md
  workflow: workflow.yaml
  fault_catalog: fault_catalog/faults.yaml
  examples: examples
  evaluations: evals

ownership:
  implementation_owner: platform_lead
  domain_owner: "PLC 成员"
  platform_reviewer: "系统负责人"
  domain_reviewer: "PLC 成员"

review:
  implementation_status: implemented
  domain_review_status: pending
  hardware_validation_status: not_started

safety:
  risk_level: medium
  permissions:
    - read
    - test_only_write

metadata:
  supported_devices:
    - "通用 PLC I/O 模块"
  required_mcp_tools:
    - plc.read_signal
    - plc.write_test_signal
    - plc.read_interlock
    - plc.wait_feedback
    - plc.reset_test_environment
  evidence_requirements:
    - "互锁状态快照"
    - "启动信号输出记录"
    - "反馈信号时序"
    - "复位确认"
  success_criteria:
    - "所有互锁条件满足"
    - "电机启动反馈在规定时间内收到"
    - "测试环境可正常复位"
  termination_criteria:
    - "互锁条件不满足且不可修复"
    - "反馈超时"
    - "测试步骤全部完成"
  regression_requirements:
    - "变更后重新运行全部 PLC I/O 测试"
